<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Imaginary Banking</title>
    <!-- Dynamic CSS linking via Thymeleaf -->
    <link rel="stylesheet" th:href="@{/css/login.css}">
</head>
<body>
<div class="login-container">
    <!-- Sends POST request to your authentication backend -->
    <form class="login-form" th:action="@{/home}">
        <h2>Create new account</h2>
        <p>Please enter your details to sign up.</p>

        <!-- Conditional Error Alert Message Box -->
        <div th:if="${param.error}" class="error-message"
             style="color: #d9534f; background: #fdf7f7; padding: 0.5rem; border-radius: 4px; margin-bottom: 1rem; font-size: 0.85rem;">
            Invalid username or password.
        </div>

        <div class="input-group">
            <label for="username">Username or Email</label>
            <input type="text" id="username" name="username" placeholder="Enter username" required>
        </div>

        <div class="input-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" placeholder="Enter password" required>
        </div>

        <div class="input-group">
            <label for="confirm-password">Password</label>
            <input type="password" id="confirm-password" name="confirm-password" placeholder="Enter password" required>
        </div>

        <button type="submit" class="login-btn">Create Account</button>

        <p class="signup-link">Already have an account? <a th:href="@{/}">Login to Account</a></p>
    </form>
</div>
</body>
</html>
