<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Imaginary Banking</title>
        <!-- Dynamic CSS linking via Thymeleaf -->
        <link rel="stylesheet" th:href="@{/css/register.css}">
    </head>
    <body>
        <header>
            <h1>Create New Account</h1>
        </header>
        <main>
            <div class="login-container">
                <!-- Sends POST request to your authentication backend -->
                <form class="login-form" th:action="@{/home}">
                    <h2>Please enter your details to sign up.</h2>

                    <!-- Conditional Error Alert Message Box -->
                    <div th:if="${param.error}" class="error-message"
                         style="color: #d9534f; background: #fdf7f7; padding: 0.5rem; border-radius: 4px; margin-bottom: 1rem; font-size: 0.85rem;">
                        Invalid username or password.
                    </div>

                    <fieldset id="user-info-container">
                        <div class="input-group">
                            <label for="firstName">First Name:</label>
                            <input type="text" id="firstName" name="firstName" placeholder="Enter first name" required>
                        </div>

                        <div class="input-group">
                            <label for="middle-initial">Middle initial:</label>
                            <input type="text" id="middle-initial" maxlength="1" name="middle-initial" placeholder="Enter middle initial" required>
                        </div>

                        <div class="input-group">
                            <label for="lastName">Last Name:</label>
                            <input type="text" id="lastName" name="lastName" placeholder="Enter last name" required>
                        </div>

                        <div class="input-group">
                            <label for="birth-date">Date of birth:</label>
                            <input type="date" id="birth-date" name="birth-date" placeholder="mm/dd/yyyy" required>
                        </div>

                        <div class="input-group">
                            <label for="street">Street address:</label>
                            <input type="text" id="street" name="street" placeholder="Enter street address">
                        </div>

                        <div class="input-group">
                            <label for="city">City:</label>
                            <input type="text" id="city" name="city" placeholder="Enter city">
                        </div>

                        <div class="input-group">
                            <label for="state">State:</label>
                            <input type="text" id="state" maxlength="2" name="state" placeholder="Enter state">
                        </div>

                        <div class="input-group">
                            <label for="zipcode">Zipcode:</label>
                            <input type="number" maxlength="5" id="zipcode" name="zipcode" placeholder="Enter zipcode">
                        </div>
                        <div class="input-group">
                            <label for="email">Email:</label>
                            <input type="email" id="email" name="email" placeholder="Enter email" required>
                        </div>
                        <div class="input-group">
                            <label for="phone">Phone number:</label>
                            <input type="tel" id="phone" name="phone" placeholder="Enter phone number" required>
                        </div>
                    </fieldset>

                    <fieldset id="account-info-container">
                        <div class="input-group">
                            <p>Account Type:</p>

                            <input type="radio" id="checking" name="account-type" value="checking">
                            <label for="checking">Checking</label>

                            <input type="radio" id="saving" name="account-type" value="saving">
                            <label for="saving">Saving</label>
                        </div>

                        <div class="input-group">
                            <label for="initial-deposit" id="include">Initial Deposit:</label>
                            <input type="number" id="initial-deposit" name="initial-deposit" placeholder="Enter an amount" required>
                        </div>
                    </fieldset>

                    <fieldset id="login-info-container">
                        <div class="input-group">
                            <label for="username">Username:</label>
                            <input type="text" id="username" name="username" placeholder="Enter username" required>
                        </div>

                        <div class="input-group">
                            <label for="password">Password:</label>
                            <input type="password" id="password" name="password" placeholder="Enter password" required>
                        </div>

                        <div class="input-group">
                            <label for="confirm-password">Confirm Password:</label>
                            <input type="password" id="confirm-password" name="confirm-password" placeholder="Enter password" required>
                        </div>
                    </fieldset>

                    <fieldset id="signature-container">
                        <div class="input-group">
                            <label for="signature">Signature:</label>
                            <input type="text" id="signature" name="signature" placeholder="Sign" required>
                        </div>

                        <div class="input-group">
                            <label for="date">Date:</label>
                            <input type="date" id="date" name="date" placeholder="mm/dd/yyyy" required>
                        </div>
                    </fieldset>

                    <button type="submit" class="signup-btn">Create Account</button>

                    <p class="login-link">Already have an account? <a th:href="@{/}">Login to Account</a></p>
                </form>
            </div>
        </main>
    </body>
</html>
